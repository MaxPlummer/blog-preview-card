<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>

  <body>
    <article class="card">
      <figure class="illustration-wrapper">
        <img
          src="./assets/images/illustration-article.svg"
          alt="Blog card illustration"
          class="illustration"
        />
      </figure>
      <header class="info">
        <span class="category">Learning</span>
        <time datetime="2023-12-21" class="publish-date"
          >Published 21 Dec 2023</time
        >
        <h1 class="title">HTML & CSS foundations</h1>
        <p class="description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </header>
      <footer class="author">
        <img
          src="./assets/images/image-avatar.webp"
          alt="Greg's avatar"
          class="avatar"
        />
        <span>Greg Hooper</span>
      </footer>
    </article>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://github.com/MaxPlummer" target="_blank">Max Plummer</a>.
    </footer>
  </body>
</html>
